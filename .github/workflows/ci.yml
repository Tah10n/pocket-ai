name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (typecheck + lint + tests)
        run: npm run verify:mobile-change

  android-smoke:
    name: android (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: verify
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Run Android smoke check
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: npm run android:emulator

      - name: Upload Android smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-smoke
          if-no-files-found: warn
          path: |
            artifacts/android-emulator-smoke.png
            artifacts/bootstrap-logcat.txt
            android/app/build/outputs/apk/debug/app-debug.apk

  android-scenarios:
    name: android (scenarios)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Run Android scenarios
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: npm run android:scenarios -- --emulator

      - name: Upload Android scenario artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-scenarios
          if-no-files-found: warn
          path: |
            artifacts/android-scenarios/**
            artifacts/bootstrap-logcat.txt
            android/app/build/outputs/apk/debug/app-debug.apk

