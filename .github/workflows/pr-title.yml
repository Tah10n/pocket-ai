name: PR Title

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize
      - labeled
      - unlabeled

permissions:
  pull-requests: read

jobs:
  semantic-pull-request:
    name: semantic-pull-request
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            perf
            test
            ci
            build
            chore
            revert
          requireScope: false
          ignoreLabels: |
            dependencies
            ignore-semantic-pull-request
