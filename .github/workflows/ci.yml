name: CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - labeled
      - unlabeled
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (typecheck + lint + tests)
        run: npm run verify:mobile-change

  android-smoke:
    name: android (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: verify
    if: >-
      github.event_name == 'pull_request' &&
      (
        contains(github.event.pull_request.labels.*.name, 'run-android-checks') ||
        contains(github.event.pull_request.body, '- [x] Run Android checks') ||
        contains(github.event.pull_request.body, '- [X] Run Android checks')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies
        run: npm ci

      - name: Generate Android native project
        run: |
          npx expo prebuild --platform android --no-install
          chmod +x android/gradlew

      - name: Build Android debug APK
        working-directory: android
        run: ./gradlew app:assembleDebug

      - name: Run Android smoke check
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-linux-hw-accel: false
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: node ./scripts/android-smoke.js --emulator --skip-build --screenshot artifacts/android-emulator-smoke.png

      - name: Upload Android smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-smoke
          if-no-files-found: warn
          path: |
            artifacts/android-emulator-smoke.png
            artifacts/bootstrap-logcat.txt
            android/app/build/outputs/apk/debug/app-debug.apk

  android-scenarios:
    name: android (scenarios)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: verify
    if: >-
      github.event_name == 'pull_request' &&
      (
        contains(github.event.pull_request.labels.*.name, 'run-android-scenarios') ||
        contains(github.event.pull_request.body, '- [x] Run Android scenarios') ||
        contains(github.event.pull_request.body, '- [X] Run Android scenarios')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies
        run: npm ci

      - name: Generate Android native project
        run: |
          npx expo prebuild --platform android --no-install
          chmod +x android/gradlew

      - name: Build Android debug APK
        working-directory: android
        run: ./gradlew app:assembleDebug

      - name: Run Android scenarios
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-linux-hw-accel: false
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: npm run android:scenarios -- --emulator --skip-build --pack extended

      - name: Upload Android scenario artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-scenarios
          if-no-files-found: warn
          path: |
            artifacts/android-scenarios/**
            artifacts/bootstrap-logcat.txt
            android/app/build/outputs/apk/debug/app-debug.apk

