version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Budapest
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      expo-sdk:
        patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
          - "expo-router"
          - "@expo-google-fonts/*"
          - "babel-preset-expo"
          - "eslint-config-expo"
          - "jest-expo"
      tooling:
        update-types:
          - minor
          - patch
        patterns:
          - "typescript"
          - "eslint"
          - "eslint-*"
          - "jest"
          - "jest-*"
          - "babel-*"
          - "@types/*"
          - "@testing-library/*"
    ignore:
      - dependency-name: "expo"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "expo-*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@expo/*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "expo-router"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "babel-preset-expo"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "eslint-config-expo"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "jest-expo"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "react-test-renderer"
      - dependency-name: "react-native"
      - dependency-name: "react-native-*"
      - dependency-name: "@react-native/*"
      - dependency-name: "@react-native-community/*"
      - dependency-name: "@react-navigation/*"
      - dependency-name: "@shopify/flash-list"
      - dependency-name: "tailwindcss"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@tailwindcss/*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "eslint-*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "jest"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "jest-*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "babel-*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@types/*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@testing-library/*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "llama.rn"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Budapest
    open-pull-requests-limit: 2
    labels:
      - dependencies
    groups:
      github-actions:
        patterns:
          - "*"

