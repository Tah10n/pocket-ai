version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Budapest
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      expo-sdk:
        patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
          - "expo-router"
          - "@expo-google-fonts/*"
      react-native-ecosystem:
        patterns:
          - "react-native"
          - "react-native-*"
          - "@react-native/*"
          - "@react-navigation/*"
          - "@shopify/flash-list"
      tooling:
        patterns:
          - "typescript"
          - "eslint"
          - "eslint-*"
          - "jest"
          - "jest-*"
          - "babel-*"
          - "@types/*"
          - "@testing-library/*"
    ignore:
      - dependency-name: "expo"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "expo-*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@expo/*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "expo-router"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react-dom"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react-native"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react-native-*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@react-native/*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react-native-reanimated"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "llama.rn"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Budapest
    open-pull-requests-limit: 2
    labels:
      - dependencies
    groups:
      github-actions:
        patterns:
          - "*"

