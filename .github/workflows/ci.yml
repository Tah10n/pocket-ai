name: CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - labeled
      - unlabeled
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (typecheck + lint + tests)
        run: npm run verify:mobile-change

  android-qa:
    name: android (qa)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: verify
    if: >-
      github.event_name == 'pull_request' &&
      (
        !contains(github.event.pull_request.labels.*.name, 'android-pack-branch-regeneration') ||
        contains(github.event.pull_request.labels.*.name, 'android-pack-all')
      ) &&
      (
        contains(github.event.pull_request.labels.*.name, 'run-android-checks') ||
        contains(github.event.pull_request.labels.*.name, 'run-android-scenarios') ||
        contains(github.event.pull_request.labels.*.name, 'android-pack-all') ||
        contains(github.event.pull_request.labels.*.name, 'android-pack-native') ||
        contains(github.event.pull_request.labels.*.name, 'android-pack-runtime') ||
        contains(github.event.pull_request.labels.*.name, 'android-pack-dependency-ui') ||
        contains(github.event.pull_request.labels.*.name, 'android-pack-catalog') ||
        contains(github.event.pull_request.labels.*.name, 'android-pack-extended') ||
        contains(github.event.pull_request.body, '- [x] Run Android checks') ||
        contains(github.event.pull_request.body, '- [X] Run Android checks') ||
        contains(github.event.pull_request.body, '- [x] Run Android scenarios') ||
        contains(github.event.pull_request.body, '- [X] Run Android scenarios')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Select Android QA pack
        shell: bash
        run: |
          pack="runtime"

          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'android-pack-all') }}" == "true" ]]; then
            pack="all"
          elif [[ "${{ contains(github.event.pull_request.labels.*.name, 'android-pack-native') }}" == "true" ]]; then
            pack="native"
          elif [[ "${{ contains(github.event.pull_request.labels.*.name, 'android-pack-runtime') }}" == "true" ]]; then
            pack="runtime"
          elif [[ "${{ contains(github.event.pull_request.labels.*.name, 'android-pack-dependency-ui') }}" == "true" ]]; then
            pack="dependency-ui"
          elif [[ "${{ contains(github.event.pull_request.labels.*.name, 'android-pack-catalog') }}" == "true" ]]; then
            pack="catalog"
          elif [[ "${{ contains(github.event.pull_request.labels.*.name, 'android-pack-extended') || contains(github.event.pull_request.labels.*.name, 'run-android-scenarios') || contains(github.event.pull_request.body, '- [x] Run Android scenarios') || contains(github.event.pull_request.body, '- [X] Run Android scenarios') }}" == "true" ]]; then
            pack="extended"
          fi

          echo "ANDROID_QA_PACK=$pack" >> "$GITHUB_ENV"
          echo "Selected Android QA pack: $pack"

      - name: Install dependencies
        run: npm ci

      - name: Run Android scenarios
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ANDROID_SMOKE_APK_VARIANT: release
          POCKET_AI_ALLOW_DEBUG_RELEASE_SIGNING: "true"
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-linux-hw-accel: false
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: npm run android:scenarios -- --emulator --pack "$ANDROID_QA_PACK" --fail-on-skip --bootstrap-screenshot

      - name: Upload Android QA artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-qa
          if-no-files-found: warn
          path: |
            artifacts/android-scenarios/**
            artifacts/bootstrap-logcat.txt
            android/app/build/outputs/apk/release/app-release.apk

  android-branch-regeneration:
    name: android (branch regeneration)
    runs-on:
      - self-hosted
      - linux
      - android
      - pocket-ai-branch-regeneration
    timeout-minutes: 120
    needs: verify
    if: >-
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'android-pack-branch-regeneration') &&
      !contains(github.event.pull_request.labels.*.name, 'android-pack-all')
    concurrency:
      group: pocket-ai-branch-regeneration
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Validate prepared Android runner
        shell: bash
        env:
          REPOSITORY_BRANCH_QA_SERIAL: ${{ vars.POCKET_AI_BRANCH_QA_SERIAL }}
        run: |
          serial="${REPOSITORY_BRANCH_QA_SERIAL:-${POCKET_AI_BRANCH_QA_SERIAL:-}}"
          if [[ -z "$serial" ]]; then
            echo "POCKET_AI_BRANCH_QA_SERIAL must name the disposable prepared device." >&2
            exit 1
          fi
          if ! command -v adb >/dev/null 2>&1; then
            echo "The prepared runner must expose adb on PATH." >&2
            exit 1
          fi
          if [[ "$(adb -s "$serial" get-state 2>/dev/null || true)" != "device" ]]; then
            echo "Prepared Android device $serial is not connected and ready." >&2
            exit 1
          fi
          if ! adb -s "$serial" shell pm path com.github.tah10n.pocketai |
            tr -d '\r' |
            grep -q '^package:'; then
            echo "The prepared device must already contain the same-signature QA app data." >&2
            exit 1
          fi
          echo "POCKET_AI_BRANCH_QA_SERIAL=$serial" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Run destructive branch-regeneration pack
        env:
          ANDROID_SMOKE_APK_VARIANT: release
          POCKET_AI_ALLOW_DEBUG_RELEASE_SIGNING: "true"
        run: >-
          npm run android:scenarios:branch-regeneration --
          --serial "$POCKET_AI_BRANCH_QA_SERIAL"
          --fail-on-skip

      - name: Upload branch-regeneration QA artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-branch-regeneration-qa
          if-no-files-found: warn
          path: |
            artifacts/android-scenarios/**
            artifacts/bootstrap-logcat.txt
            android/app/build/outputs/apk/release/app-release.apk

