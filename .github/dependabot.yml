version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Budapest
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      expo-sdk:
        patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
          - "expo-router"
      tooling:
        patterns:
          - "typescript"
          - "eslint"
          - "eslint-*"
          - "jest"
          - "jest-*"
          - "babel-*"
          - "@types/*"
          - "@testing-library/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Budapest
    open-pull-requests-limit: 10
    labels:
      - dependencies

